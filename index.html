<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>메모장</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fafc;
      --danger: #ef4444;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* AUTH */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }

    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
      cursor: pointer;
      user-select: none;
    }

    .auth-logo h1 { font-size: 26px; font-weight: 700; color: var(--primary); }
    .auth-logo p { color: var(--text-muted); margin-top: 4px; font-size: 13px; }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-group input:focus { border-color: var(--primary); }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary { background: var(--primary); color: white; margin-top: 4px; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:active { transform: scale(0.98); }

    .save-options {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
    }

    .save-option {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .save-option input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .auth-message {
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      min-height: 18px;
    }

    .auth-message.error { color: var(--danger); }
    .auth-message.success { color: var(--success); }

    /* ADMIN MODAL */
    #admin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #admin-overlay.show { display: flex; }

    .admin-card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
      margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .admin-header h2 { font-size: 18px; font-weight: 700; }

    .admin-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .admin-message {
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }

    .admin-message.error { color: var(--danger); }
    .admin-message.success { color: var(--success); }

    .admin-hint { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 16px; }

    .btn-success {
      width: 100%;
      padding: 11px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
      transition: background 0.2s;
    }

    .btn-success:hover { background: #059669; }

    /* APP */
    #app-screen { display: none; height: 100vh; }

    .app-layout { display: flex; height: 100vh; }

    .sidebar {
      width: 300px;
      background: white;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header { padding: 18px 14px 12px; border-bottom: 1px solid var(--border); }

    .sidebar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .sidebar-title { font-size: 17px; font-weight: 700; }

    .btn-new {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 300;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .btn-new:hover { background: #4338ca; }

    .search-box {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      background: var(--bg);
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--primary); }

    .notes-list { flex: 1; overflow-y: auto; padding: 6px; }
    .notes-list::-webkit-scrollbar { width: 4px; }
    .notes-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .note-item {
      padding: 11px 13px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 3px;
      transition: all 0.15s;
      border: 1.5px solid transparent;
    }

    .note-item:hover { background: var(--bg); }
    .note-item.active { background: var(--primary-light); border-color: #c7d2fe; }

    .note-item-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item.active .note-item-title { color: var(--primary); }

    .note-item-preview {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item-date { font-size: 11px; color: #94a3b8; margin-top: 4px; }

    .empty-list {
      text-align: center;
      color: var(--text-muted);
      padding: 48px 20px;
      font-size: 14px;
      line-height: 1.8;
    }

    .sidebar-footer { padding: 11px 14px; border-top: 1px solid var(--border); }

    .user-info { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .btn-logout {
      padding: 5px 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-logout:hover { color: var(--danger); border-color: var(--danger); }

    .editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }

    .editor-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .editor-empty-icon { font-size: 52px; margin-bottom: 14px; }
    .editor-empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .editor-empty p { font-size: 14px; line-height: 1.7; }

    .editor-main { display: none; flex-direction: column; height: 100%; }

    .editor-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-back {
      display: none;
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 20px;
      color: var(--text-muted);
      padding: 0;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
    }

    .title-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 17px;
      font-weight: 700;
      background: transparent;
      font-family: inherit;
      min-width: 0;
    }

    .title-input::placeholder { color: #cbd5e1; font-weight: 400; }

    .editor-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .save-indicator {
      font-size: 12px;
      color: var(--success);
      opacity: 0;
      transition: opacity 0.4s;
      white-space: nowrap;
    }

    .save-indicator.show { opacity: 1; }

    .btn-save {
      padding: 7px 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .btn-save:hover { background: #4338ca; }

    .btn-delete {
      padding: 7px 12px;
      background: white;
      color: var(--danger);
      border: 1px solid #fecaca;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-delete:hover { background: #fef2f2; }

    .content-area { flex: 1; padding: 18px 20px; overflow-y: auto; display: flex; }

    .content-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 15px;
      line-height: 1.8;
      resize: none;
      background: transparent;
      font-family: inherit;
    }

    .content-input::placeholder { color: #cbd5e1; }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      transition: transform 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      .sidebar { width: 100%; position: absolute; inset: 0; z-index: 10; }
      .editor { position: absolute; inset: 0; z-index: 20; transform: translateX(100%); transition: transform 0.28s ease; }
      .editor.open { transform: translateX(0); }
      .btn-back { display: flex !important; }
    }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo" onclick="handleLogoClick()">
      <h1>📝 록근_수정1</h1>
      <p>이름과 비밀번호로 로그인하세요</p>
    </div>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="login-username" placeholder="이름 입력" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="login-password" placeholder="비밀번호 입력"
        onkeydown="if(event.key==='Enter') login()" />
    </div>
    <div class="save-options">
      <label class="save-option">
        <input type="checkbox" id="save-username" />
        <span>아이디 저장</span>
      </label>
      <label class="save-option">
        <input type="checkbox" id="save-password" />
        <span>비밀번호 저장</span>
      </label>
    </div>
    <button class="btn btn-primary" onclick="login()">로그인</button>
    <div class="auth-message" id="auth-message"></div>
  </div>
</div>

<!-- 관리자 패널 -->
<div id="admin-overlay">
  <div class="admin-card">
    <div class="admin-header">
      <h2>⚙️ 관리자 패널</h2>
      <button class="admin-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="form-group">
      <label>관리자 비밀번호</label>
      <input type="password" id="admin-password" placeholder="관리자 비밀번호" />
    </div>
    <div class="form-group">
      <label>새 사용자 이름</label>
      <input type="text" id="new-username" placeholder="이름 입력" />
    </div>
    <div class="form-group">
      <label>새 사용자 비밀번호</label>
      <input type="password" id="new-password" placeholder="비밀번호 입력"
        onkeydown="if(event.key==='Enter') createUser()" />
    </div>
    <button class="btn-success" onclick="createUser()">계정 생성</button>
    <div class="admin-message" id="admin-message"></div>
    <div class="admin-hint">로고를 5번 클릭하면 열립니다</div>
  </div>
</div>

<!-- 앱 화면 -->
<div id="app-screen">
  <div class="app-layout">

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-top">
          <span class="sidebar-title">📝 메모장</span>
          <button class="btn-new" onclick="newNote()">+</button>
        </div>
        <input class="search-box" type="text" placeholder="메모 검색..."
          oninput="searchNotes(this.value)" />
      </div>
      <div class="notes-list" id="notes-list">
        <div class="empty-list">불러오는 중...</div>
      </div>
      <div class="sidebar-footer">
        <div class="user-info">
          <span class="user-name" id="user-name"></span>
          <button class="btn-logout" onclick="logout()">로그아웃</button>
        </div>
      </div>
    </div>

    <div class="editor" id="editor">
      <div class="editor-empty" id="editor-empty">
        <div class="editor-empty-icon">✏️</div>
        <h3>메모를 선택하거나 새로 만드세요</h3>
        <p>왼쪽에서 메모를 선택하거나<br>+ 버튼을 눌러 새 메모를 작성하세요</p>
      </div>
      <div class="editor-main" id="editor-main">
        <div class="editor-header">
          <button class="btn-back" onclick="backToList()">←</button>
          <input class="title-input" type="text" id="note-title" placeholder="제목 (선택사항)" />
          <div class="editor-actions">
            <span class="save-indicator" id="save-indicator">저장됨 ✓</span>
            <button class="btn-save" onclick="saveNote()">저장</button>
            <button class="btn-delete" id="btn-delete" onclick="deleteNote()" style="display:none">삭제</button>
          </div>
        </div>
        <div class="content-area">
          <textarea class="content-input" id="note-content" placeholder="메모를 입력하세요..."></textarea>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://lmtdmubkmmuchomkbvwy.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtdGRtdWJrbW11Y2hvbWtidnd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjI0NzUsImV4cCI6MjA5MzczODQ3NX0.4FZ9t356ZaWI52E0Mofruool2OUrTNp6kmgAOi6tkhA';
  const ADMIN_PASSWORD = 'admin1234'; // 변경 가능

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUsername = null;
  let allNotes = [];
  let currentNoteId = null;
  let logoClickCount = 0;
  let logoClickTimer = null;

  // ===== INIT =====
  function init() {
    const saved = localStorage.getItem('memo_user');
    if (saved) {
      currentUsername = saved;
      showApp();
    } else {
      // 저장된 아이디/비밀번호 복원
      const savedId = localStorage.getItem('memo_saved_id');
      const savedPw = localStorage.getItem('memo_saved_pw');
      if (savedId) {
        document.getElementById('login-username').value = savedId;
        document.getElementById('save-username').checked = true;
      }
      if (savedPw) {
        document.getElementById('login-password').value = savedPw;
        document.getElementById('save-password').checked = true;
      }
      showAuth();
    }
  }

  // ===== AUTH =====
  function showAuth() {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('user-name').textContent = currentUsername;
    loadNotes();
  }

  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) { setAuthMsg('이름과 비밀번호를 입력하세요.', 'error'); return; }

    setAuthMsg('로그인 중...', '');

    const { data, error } = await sb.rpc('verify_login', {
      p_username: username,
      p_password: password
    });

    if (error || !data) {
      setAuthMsg('이름 또는 비밀번호가 틀렸습니다.', 'error');
      return;
    }

    // 아이디/비밀번호 저장 처리
    if (document.getElementById('save-username').checked) {
      localStorage.setItem('memo_saved_id', username);
    } else {
      localStorage.removeItem('memo_saved_id');
    }
    if (document.getElementById('save-password').checked) {
      localStorage.setItem('memo_saved_pw', password);
    } else {
      localStorage.removeItem('memo_saved_pw');
    }

    currentUsername = username;
    localStorage.setItem('memo_user', username);
    showApp();
  }

  function logout() {
    localStorage.removeItem('memo_user');
    currentUsername = null;
    allNotes = [];
    currentNoteId = null;
    document.getElementById('editor-empty').style.display = 'flex';
    document.getElementById('editor-main').style.display = 'none';
    document.getElementById('editor').classList.remove('open');
    showAuth();
  }

  function setAuthMsg(msg, type) {
    const el = document.getElementById('auth-message');
    el.textContent = msg;
    el.className = 'auth-message' + (type ? ' ' + type : '');
  }

  // ===== ADMIN =====
  function handleLogoClick() {
    logoClickCount++;
    clearTimeout(logoClickTimer);
    logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);
    if (logoClickCount >= 5) {
      logoClickCount = 0;
      document.getElementById('admin-overlay').classList.add('show');
    }
  }

  function closeAdmin() {
    document.getElementById('admin-overlay').classList.remove('show');
    document.getElementById('admin-message').textContent = '';
    document.getElementById('admin-password').value = '';
    document.getElementById('new-username').value = '';
    document.getElementById('new-password').value = '';
  }

  async function createUser() {
    const adminPass = document.getElementById('admin-password').value;
    const newUsername = document.getElementById('new-username').value.trim();
    const newPassword = document.getElementById('new-password').value;

    if (adminPass !== ADMIN_PASSWORD) { setAdminMsg('관리자 비밀번호가 틀렸습니다.', 'error'); return; }
    if (!newUsername || !newPassword) { setAdminMsg('이름과 비밀번호를 입력하세요.', 'error'); return; }

    setAdminMsg('생성 중...', '');

    const { data, error } = await sb.rpc('create_memo_user', {
      p_username: newUsername,
      p_password: newPassword
    });

    if (error) {
      setAdminMsg(error.message.includes('이미 존재') ? '이미 존재하는 이름입니다.' : '오류: ' + error.message, 'error');
      return;
    }

    setAdminMsg('✓ ' + newUsername + ' 계정이 생성됐습니다!', 'success');
    document.getElementById('new-username').value = '';
    document.getElementById('new-password').value = '';
  }

  function setAdminMsg(msg, type) {
    const el = document.getElementById('admin-message');
    el.textContent = msg;
    el.className = 'admin-message' + (type ? ' ' + type : '');
  }

  // ===== NOTES =====
  async function loadNotes() {
    const { data, error } = await sb
      .from('notes')
      .select('*')
      .eq('username', currentUsername)
      .order('updated_at', { ascending: false });

    if (error) { console.error(error); return; }
    allNotes = data || [];
    renderList(allNotes);
  }

  function renderList(notes) {
    const list = document.getElementById('notes-list');
    if (notes.length === 0) {
      list.innerHTML = '<div class="empty-list">메모가 없습니다.<br>+ 버튼을 눌러 새 메모를 만드세요.</div>';
      return;
    }
    list.innerHTML = notes.map(n => `
      <div class="note-item ${n.id === currentNoteId ? 'active' : ''}" onclick="openNote('${n.id}')">
        <div class="note-item-title">${esc(n.title || '제목 없음')}</div>
        <div class="note-item-preview">${esc(n.content.slice(0, 60))}</div>
        <div class="note-item-date">${timeAgo(n.updated_at)}</div>
      </div>
    `).join('');
  }

  function openNote(id) {
    const note = allNotes.find(n => n.id === id);
    if (!note) return;
    currentNoteId = id;
    document.getElementById('note-title').value = note.title || '';
    document.getElementById('note-content').value = note.content;
    document.getElementById('btn-delete').style.display = 'block';
    showEditorPanel();
    renderList(allNotes);
  }

  function newNote() {
    currentNoteId = null;
    document.getElementById('note-title').value = '';
    document.getElementById('note-content').value = '';
    document.getElementById('btn-delete').style.display = 'none';
    showEditorPanel();
    renderList(allNotes);
    setTimeout(() => document.getElementById('note-content').focus(), 100);
  }

  function showEditorPanel() {
    document.getElementById('editor-empty').style.display = 'none';
    document.getElementById('editor-main').style.display = 'flex';
    document.getElementById('editor').classList.add('open');
  }

  function backToList() {
    document.getElementById('editor').classList.remove('open');
  }

  async function saveNote() {
    const title = document.getElementById('note-title').value.trim();
    const content = document.getElementById('note-content').value.trim();
    if (!content) { showToast('내용을 입력하세요.'); return; }

    if (currentNoteId) {
      const { error } = await sb.from('notes')
        .update({ title, content, updated_at: new Date().toISOString() })
        .eq('id', currentNoteId)
        .eq('username', currentUsername);
      if (error) { showToast('저장에 실패했습니다.'); return; }
    } else {
      const { data, error } = await sb.from('notes')
        .insert({ title, content, username: currentUsername })
        .select().single();
      if (error) { showToast('저장에 실패했습니다.'); return; }
      currentNoteId = data.id;
      document.getElementById('btn-delete').style.display = 'block';
    }

    showSaved();
    await loadNotes();
  }

  async function deleteNote() {
    if (!currentNoteId) return;
    if (!confirm('이 메모를 삭제할까요?')) return;

    const { error } = await sb.from('notes').delete()
      .eq('id', currentNoteId)
      .eq('username', currentUsername);
    if (error) { showToast('삭제에 실패했습니다.'); return; }

    currentNoteId = null;
    document.getElementById('editor-empty').style.display = 'flex';
    document.getElementById('editor-main').style.display = 'none';
    document.getElementById('editor').classList.remove('open');
    showToast('메모가 삭제되었습니다.');
    await loadNotes();
  }

  function searchNotes(q) {
    if (!q.trim()) { renderList(allNotes); return; }
    const lower = q.toLowerCase();
    renderList(allNotes.filter(n =>
      (n.title && n.title.toLowerCase().includes(lower)) ||
      n.content.toLowerCase().includes(lower)
    ));
  }

  // ===== UTILS =====
  function showSaved() {
    const el = document.getElementById('save-indicator');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    if (diff < 60000) return '방금 전';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}분 전`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}시간 전`;
    const d = new Date(dateStr);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
