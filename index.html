<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>메모장</title>
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fafc;
      --danger: #ef4444;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* AUTH */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }

    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
      cursor: pointer;
      user-select: none;
    }

    .auth-logo h1 { font-size: 26px; font-weight: 700; color: var(--primary); }
    .auth-logo p { color: var(--text-muted); margin-top: 4px; font-size: 13px; }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-group input:focus { border-color: var(--primary); }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary { background: var(--primary); color: white; margin-top: 4px; }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:active { transform: scale(0.98); }

    .save-options {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
    }

    .save-option {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .save-option input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .auth-message {
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      min-height: 18px;
    }

    .auth-message.error { color: var(--danger); }
    .auth-message.success { color: var(--success); }

    /* ADMIN MODAL */
    #admin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #admin-overlay.show { display: flex; }

    .admin-card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
      margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .admin-header h2 { font-size: 18px; font-weight: 700; }

    .admin-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .admin-message {
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }

    .admin-message.error { color: var(--danger); }
    .admin-message.success { color: var(--success); }

    .admin-hint { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 16px; }

    .btn-success {
      width: 100%;
      padding: 11px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
      transition: background 0.2s;
    }

    .btn-success:hover { background: #059669; }

    /* APP */
    #app-screen { display: none; height: 100vh; }

    .app-layout { display: flex; height: 100vh; }

    .sidebar {
      width: 300px;
      background: white;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header { padding: 18px 14px 12px; border-bottom: 1px solid var(--border); }

    .sidebar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .sidebar-title { font-size: 17px; font-weight: 700; }

    .btn-new {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 300;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .btn-new:hover { background: #4338ca; }

    .search-box {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      background: var(--bg);
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--primary); }

    .btn-search-clickup {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 15px;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .btn-search-clickup:hover { background: var(--primary-light); border-color: var(--primary); }

    .btn-my-tasks {
      width: 100%;
      padding: 7px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-my-tasks:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
    .btn-my-tasks.active { background: var(--primary); color: white; border-color: var(--primary); }

    .sidebar-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 10px;
    }

    .tab-btn {
      flex: 1;
      padding: 7px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .notes-list { flex: 1; overflow-y: auto; padding: 6px; }
    .notes-list::-webkit-scrollbar { width: 4px; }
    .notes-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .note-item {
      padding: 11px 13px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 3px;
      transition: all 0.15s;
      border: 1.5px solid transparent;
    }

    .note-item:hover { background: var(--bg); }
    .note-item.active { background: var(--primary-light); border-color: #c7d2fe; }

    .note-item-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item.active .note-item-title { color: var(--primary); }

    .note-item-preview {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item-date { font-size: 11px; color: #94a3b8; margin-top: 4px; }

    .tasks-list { flex: 1; overflow-y: auto; padding: 6px; display: none; }
    .tasks-list::-webkit-scrollbar { width: 4px; }
    .tasks-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .task-item {
      padding: 11px 13px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 3px;
      transition: all 0.15s;
      border: 1.5px solid transparent;
    }

    .task-item:hover { background: var(--bg); }
    .task-item.active { background: var(--primary-light); border-color: #c7d2fe; }

    .task-item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-item.active .task-item-title { color: var(--primary); }

    .task-item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .task-status {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      color: white;
    }

    .task-assignee {
      font-size: 11px;
      color: var(--text-muted);
    }

    .task-due {
      font-size: 11px;
      color: #94a3b8;
      margin-left: auto;
    }

    .task-detail {
      padding: 24px;
      overflow-y: auto;
      height: 100%;
    }

    .task-detail-title {
      display: block;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.4;
      text-decoration: none;
    }
    .task-detail-title:hover { color: var(--primary); text-decoration: underline; }

    .task-detail-info {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .task-detail-row {
      display: flex;
      gap: 10px;
      font-size: 13px;
    }

    .task-detail-label {
      color: var(--text-muted);
      font-weight: 600;
      min-width: 60px;
    }

    .task-detail-desc {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .task-attachments {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .task-attachments-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .task-attachments-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .attachment-file {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s;
    }

    .attachment-file:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

    .desc-rendered table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
      margin: 8px 0;
    }
    .desc-rendered th, .desc-rendered td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }
    .desc-rendered th { background: #f5f6fa; font-weight: 700; }
    .desc-rendered p { margin: 4px 0; }
    .desc-rendered ul, .desc-rendered ol { padding-left: 20px; margin: 4px 0; }

    .attachment-dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px;
      background: var(--primary-light);
      border: 1.5px solid var(--primary);
      border-radius: 7px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .attachment-dl-btn:hover { background: var(--primary); color: white; }

    .license-task-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .license-task-item:hover { background: var(--primary-light); }
    .license-task-item.active { background: #e8eeff; border-left: 3px solid var(--primary); }
    .license-task-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .license-task-meta { display: flex; gap: 8px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }
    .license-list-badge {
      background: #f0f0f0;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      color: #555;
    }

    .empty-list {
      text-align: center;
      color: var(--text-muted);
      padding: 48px 20px;
      font-size: 14px;
      line-height: 1.8;
    }

    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .task-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 0 4px;
    }
    .page-btn {
      padding: 4px 14px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      background: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .page-btn:hover:not(:disabled) { background: var(--primary-light); border-color: var(--primary); }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-info { font-size: 12px; color: var(--text-muted); }

    .sidebar-footer { padding: 11px 14px; border-top: 1px solid var(--border); }

    .user-info { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .btn-logout {
      padding: 5px 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-logout:hover { color: var(--danger); border-color: var(--danger); }

    .btn-settings {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .btn-settings:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

    /* SETTINGS MODAL */
    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #settings-overlay.show { display: flex; }

    .settings-card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .settings-header h2 { font-size: 18px; font-weight: 700; }

    .settings-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .settings-divider {
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 16px 0 10px;
    }

    .settings-message {
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }
    .settings-message.error { color: var(--danger); }
    .settings-message.success { color: var(--success); }

    .input-hint { font-size: 11px; color: #94a3b8; margin-top: 3px; }

    /* Quill 에디터 */
    .ql-toolbar.ql-snow {
      border: none !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 8px 14px !important;
      flex-shrink: 0;
    }
    .ql-container.ql-snow {
      border: none !important;
      flex: 1;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
      font-size: 15px;
    }
    .ql-editor {
      padding: 18px 20px !important;
      line-height: 1.8 !important;
      min-height: 100%;
    }
    .ql-editor.ql-blank::before {
      color: #cbd5e1 !important;
      font-style: normal !important;
    }
    .ql-editor img {
      max-width: 100%;
      border-radius: 6px;
      margin: 4px 0;
    }

#img-resize-overlay {
      position: fixed;
      display: none;
      border: 2px solid var(--primary);
      pointer-events: none;
      z-index: 9997;
      box-sizing: border-box;
    }
    #img-resize-handle {
      position: absolute;
      right: -7px;
      bottom: -7px;
      width: 14px;
      height: 14px;
      background: var(--primary);
      border: 2px solid white;
      border-radius: 3px;
      cursor: se-resize;
      pointer-events: auto;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    #img-resize-label {
      position: absolute;
      bottom: -24px;
      left: 0;
      font-size: 11px;
      color: var(--primary);
      background: white;
      padding: 1px 6px;
      border-radius: 4px;
      border: 1px solid #c7d2fe;
      pointer-events: none;
      white-space: nowrap;
    }
    #quill-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: white; }

    .editor-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .editor-empty-icon { font-size: 52px; margin-bottom: 14px; }
    .editor-empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .editor-empty p { font-size: 14px; line-height: 1.7; }

    .editor-main { display: none; flex-direction: column; height: 100%; }

    .editor-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-back {
      display: none;
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 20px;
      color: var(--text-muted);
      padding: 0;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
    }

    .title-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 17px;
      font-weight: 700;
      background: transparent;
      font-family: inherit;
      min-width: 0;
    }

    .title-input::placeholder { color: #cbd5e1; font-weight: 400; }

    .editor-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .save-indicator {
      font-size: 12px;
      color: var(--success);
      opacity: 0;
      transition: opacity 0.4s;
      white-space: nowrap;
    }

    .save-indicator.show { opacity: 1; }

    .btn-save {
      padding: 7px 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .btn-save:hover { background: #4338ca; }

    .btn-delete {
      padding: 7px 12px;
      background: white;
      color: var(--danger);
      border: 1px solid #fecaca;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-delete:hover { background: #fef2f2; }

    .content-area { flex: 1; padding: 18px 20px; overflow-y: auto; display: flex; }

    .content-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 15px;
      line-height: 1.8;
      resize: none;
      background: transparent;
      font-family: inherit;
    }

    .content-input::placeholder { color: #cbd5e1; }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      transition: transform 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      .sidebar { width: 100%; position: absolute; inset: 0; z-index: 10; }
      .editor { position: absolute; inset: 0; z-index: 20; transform: translateX(100%); transition: transform 0.28s ease; }
      .editor.open { transform: translateX(0); }
      .btn-back { display: flex !important; }
    }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo" onclick="handleLogoClick()">
      <h1>📝 록근_v43</h1>

    <div class="form-group">

<!-- 관리자 패널 -->
<div id="admin-overlay">

    <div class="form-group">

        onkeydown="if(event.key==='Enter') createUser()" />

</div>

<!-- 프로필 설정 모달 -->
<div id="settings-overlay">
  <div class="settings-card">
    <div class="settings-header">

    <div class="form-group">

    <div class="form-group">
      <label>새 비밀번호</label>

<!-- 앱 화면 -->
<div id="app-screen">
  <div class="app-layout">

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-top">
          <span class="sidebar-title">📝 메모장</span>
          <button class="btn-new" id="btn-new-note" onclick="newNote()">+</button>

        <div class="sidebar-tabs">
          <button class="tab-btn active" id="tab-notes" onclick="switchTab('notes')">메모</button>
          <button class="tab-btn" id="tab-clickup" onclick="switchTab('clickup')">ClickUp</button>

          <div class="sidebar-tabs" style="margin-bottom:0;">

            <input class="search-box" id="search-box-my-tasks" type="text" placeholder="내 태스크 검색..."
              oninput="filterMyTasks(this.value)"
              style="margin:0; flex:1; width:0;" />
            <button class="btn-search-clickup" onclick="fetchMyTasks(true)" title="새로고침">🔍</button>
          </div>
        </div>

      <div class="notes-list" id="notes-list">

      <div class="tasks-list" id="tasks-list">

      </div>
      <div class="notes-list" id="license-list" style="display:none;">
        <div class="empty-list">라이선스 탭을 클릭하면 불러옵니다.</div>

      <div class="sidebar-footer">

        <p>왼쪽에서 메모를 선택하거나<br>+ 버튼을 눌러 새 메모를 작성하세요</p>
      </div>
      <div class="editor-main" id="editor-main">

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const SUPABASE_URL = 'https://lmtdmubkmmuchomkbvwy.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtdGRtdWJrbW11Y2hvbWtidnd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjI0NzUsImV4cCI6MjA5MzczODQ3NX0.4FZ9t356ZaWI52E0Mofruool2OUrTNp6kmgAOi6tkhA';
  const ADMIN_PASSWORD = 'admin1234'; // 변경 가능
  const CLICKUP_TOKEN_DEFAULT = 'pk_43586564_0YLCBJ33J3UIRLFWTJOEKO98AXN6IVZF';
  let CLICKUP_TOKEN = CLICKUP_TOKEN_DEFAULT;
  const CLICKUP_SPACE_ID = '90030550766'; // [DEQ]협업시스템

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUsername = null;
  let allNotes = [];
  let currentNoteId = null;
  let logoClickCount = 0;
  let logoClickTimer = null;
  let currentTab = 'notes';
  let cuSubTab = 'search';   // 'my' | 'search'
  let myTasks = [];          // 내 태스크 전체 (필터 전)
  let allTasks = [];
  let currentTaskId = null;
  let cuPage = 0;        // ClickUp API 페이지
  let cuHasMore = true;  // ClickUp에 더 있는지
  let cuKeyword = '';    // 현재 검색어
  let cuFiltered = [];   // 필터된 전체 태스크

  // ===== INIT =====
  function init() {
    initQuill();
    const saved = localStorage.getItem('memo_user');
    if (saved) {
      currentUsername = saved;
      showApp();
    } else {
      // 저장된 아이디/비밀번호 복원
      const savedId = localStorage.getItem('memo_saved_id');
      const savedPw = localStorage.getItem('memo_saved_pw');
      if (savedId) {
        document.getElementById('login-username').value = savedId;
        document.getElementById('save-username').checked = true;
      }
      if (savedPw) {
        document.getElementById('login-password').value = savedPw;
        document.getElementById('save-password').checked = true;
      }
      showAuth();
    }
  }

  // ===== AUTH =====
  function showAuth() {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    setAuthMsg('', '');
  }

  async function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('user-name').textContent = currentUsername;
    await loadUserProfile();
    loadNotes();
  }

  async function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) { setAuthMsg('이름과 비밀번호를 입력하세요.', 'error'); return; }

    setAuthMsg('로그인 중...', '');

    const { data, error } = await sb.rpc('verify_login', {
      p_username: username,
      p_password: password
    });

    if (error || !data) {
      setAuthMsg('이름 또는 비밀번호가 틀렸습니다.', 'error');
      return;
    }

    // 아이디/비밀번호 저장 처리
    if (document.getElementById('save-username').checked) {
      localStorage.setItem('memo_saved_id', username);
    } else {
      localStorage.removeItem('memo_saved_id');
    }
    if (document.getElementById('save-password').checked) {
      localStorage.setItem('memo_saved_pw', password);
    } else {
      localStorage.removeItem('memo_saved_pw');
    }

    currentUsername = username;
    localStorage.setItem('memo_user', username);
    showApp();
  }

  function logout() {
    localStorage.removeItem('memo_user');
    currentUsername = null;
    allNotes = [];
    currentNoteId = null;
    document.getElementById('editor-empty').style.display = 'flex';
    document.getElementById('editor-main').style.display = 'none';
    document.getElementById('editor').classList.remove('open');
    showAuth();
  }

  function setAuthMsg(msg, type) {
    const el = document.getElementById('auth-message');
    el.textContent = msg;
    el.className = 'auth-message' + (type ? ' ' + type : '');
  }

  // ===== ADMIN =====
  function handleLogoClick() {
    logoClickCount++;
    clearTimeout(logoClickTimer);
    logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);
    if (logoClickCount >= 5) {
      logoClickCount = 0;
      document.getElementById('admin-overlay').classList.add('show');
    }
  }

  function closeAdmin() {
    document.getElementById('admin-overlay').classList.remove('show');
    document.getElementById('admin-message').textContent = '';
    document.getElementById('admin-password').value = '';
    document.getElementById('new-username').value = '';
    document.getElementById('new-password').value = '';
  }

  async function createUser() {
    const adminPass = document.getElementById('admin-password').value;
    const newUsername = document.getElementById('new-username').value.trim();
    const newPassword = document.getElementById('new-password').value;

    if (adminPass !== ADMIN_PASSWORD) { setAdminMsg('관리자 비밀번호가 틀렸습니다.', 'error'); return; }
    if (!newUsername || !newPassword) { setAdminMsg('이름과 비밀번호를 입력하세요.', 'error'); return; }

    setAdminMsg('생성 중...', '');

    const { data, error } = await sb.rpc('create_memo_user', {
      p_username: newUsername,
      p_password: newPassword
    });

    if (error) {
      setAdminMsg(error.message.includes('이미 존재') ? '이미 존재하는 이름입니다.' : '오류: ' + error.message, 'error');
      return;
    }

    setAdminMsg('✓ ' + newUsername + ' 계정이 생성됐습니다!', 'success');
    document.getElementById('new-username').value = '';
    document.getElementById('new-password').value = '';
  }

  function setAdminMsg(msg, type) {
    const el = document.getElementById('admin-message');
    el.textContent = msg;
    el.className = 'admin-message' + (type ? ' ' + type : '');
  }

  // ===== SETTINGS =====
  let userProfile = {};

  async function loadUserProfile() {
    const { data, error } = await sb.rpc('get_user_profile', { p_username: currentUsername });
    if (error || !data?.length) return;
    userProfile = data[0];
    if (userProfile.clickup_token) CLICKUP_TOKEN = userProfile.clickup_token;
    const displayName = userProfile.display_name || currentUsername;
    document.getElementById('user-name').textContent = displayName;
  }

  async function openSettings() {
    document.getElementById('settings-id').value = currentUsername;
    document.getElementById('settings-display-name').value = '';
    document.getElementById('settings-new-password').value = '';
    document.getElementById('settings-clickup-token').value = '';
    setSettingsMsg('불러오는 중...', '');
    document.getElementById('settings-overlay').classList.add('show');

    const { data, error } = await sb.rpc('get_user_profile', { p_username: currentUsername });
    if (!error && data?.length) {
      userProfile = data[0];
      document.getElementById('settings-id').value = userProfile.username || currentUsername;
      document.getElementById('settings-display-name').value = userProfile.display_name || '';
      document.getElementById('settings-clickup-token').value = userProfile.clickup_token || '';
    }
    setSettingsMsg('', '');
  }

  function closeSettings() {
    document.getElementById('settings-overlay').classList.remove('show');
  }

  async function saveProfile() {
    const newId = document.getElementById('settings-id').value.trim();
    const displayName = document.getElementById('settings-display-name').value.trim();
    const newPassword = document.getElementById('settings-new-password').value;
    const clickupToken = document.getElementById('settings-clickup-token').value.trim();

    if (!newId) { setSettingsMsg('아이디를 입력하세요.', 'error'); return; }

    setSettingsMsg('저장 중...', '');

    const { data, error } = await sb.rpc('update_user_profile', {
      p_username: currentUsername,
      p_new_id: newId,
      p_display_name: displayName,
      p_new_password: newPassword,
      p_clickup_token: clickupToken
    });

    if (error) {
      setSettingsMsg(error.message || '저장에 실패했습니다.', 'error');
      return;
    }

    // ID가 변경된 경우 localStorage 업데이트
    if (newId !== currentUsername) {
      currentUsername = newId;
      localStorage.setItem('memo_user', newId);
    }

    if (clickupToken) CLICKUP_TOKEN = clickupToken;
    userProfile = { ...userProfile, username: newId, display_name: displayName, clickup_token: clickupToken };

    const displayNameShow = displayName || newId;
    document.getElementById('user-name').textContent = displayNameShow;

    setSettingsMsg('✓ 저장됐습니다!', 'success');
    setTimeout(closeSettings, 1200);
  }

  function setSettingsMsg(msg, type) {
    const el = document.getElementById('settings-message');
    el.textContent = msg;
    el.className = 'settings-message' + (type ? ' ' + type : '');
  }

  function sortByDateCreated(tasks) {
    return tasks.slice().sort((a, b) => Number(b.date_created) - Number(a.date_created));
  }

  // ===== CLICKUP =====
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-notes').classList.toggle('active', tab === 'notes');
    document.getElementById('tab-clickup').classList.toggle('active', tab === 'clickup');
    document.getElementById('tab-license').classList.toggle('active', tab === 'license');
    document.getElementById('notes-list').style.display = tab === 'notes' ? 'block' : 'none';
    document.getElementById('tasks-list').style.display = tab === 'clickup' ? 'block' : 'none';
    document.getElementById('license-list').style.display = tab === 'license' ? 'block' : 'none';
    document.getElementById('search-box-notes').style.display = tab === 'notes' ? 'block' : 'none';
    document.getElementById('clickup-search-wrap').style.display = tab === 'clickup' ? 'flex' : 'none';
    document.getElementById('btn-new-note').style.display = tab === 'notes' ? 'flex' : 'none';

    if (tab === 'clickup') {
      cuSubTab = 'search';
      switchCuTab('search');
    }
    if (tab === 'license') {
      loadLicenseTasks();
    }

    // 에디터 초기화
    document.getElementById('editor-empty').style.display = 'flex';
    document.getElementById('editor-main').style.display = 'none';
    document.getElementById('editor').classList.remove('open');
    const existing = document.getElementById('task-detail');
    if (existing) existing.remove();
    currentNoteId = null;
    currentTaskId = null;
  }

  function switchCuTab(tab) {
    cuSubTab = tab;
    document.getElementById('cu-tab-my').classList.toggle('active', tab === 'my');
    document.getElementById('cu-tab-search').classList.toggle('active', tab === 'search');
    document.getElementById('cu-search-row').style.display = tab === 'search' ? 'flex' : 'none';
    document.getElementById('cu-my-search-row').style.display = tab === 'my' ? 'flex' : 'none';

    // 에디터 초기화
    const existing = document.getElementById('task-detail');
    if (existing) existing.remove();
    document.getElementById('editor-empty').style.display = 'flex';
    document.getElementById('editor').classList.remove('open');
    currentTaskId = null;

    if (tab === 'my') {
      document.getElementById('search-box-my-tasks').value = '';
      if (myTasks.length > 0) {
        // 이미 로드된 데이터 있으면 그대로 표시
        cuFiltered = myTasks;
        allTasks = myTasks;
        cuHasMore = false;
        renderTaskPage();
      } else {
        fetchMyTasks();
      }
    } else {
      cuFiltered = [];
      allTasks = [];
      document.getElementById('tasks-list').innerHTML = '<div class="empty-list">검색어를 입력하고<br>Enter를 누르세요</div>';
      document.getElementById('search-box-clickup').value = '';
    }
  }

  function filterMyTasks(q) {
    if (!q.trim()) {
      allTasks = myTasks;
      cuFiltered = myTasks;
      renderTaskPage();
      return;
    }
    const lower = q.toLowerCase();
    cuFiltered = myTasks.filter(t =>
      (t.name && t.name.toLowerCase().includes(lower)) ||
      (t.description && t.description.toLowerCase().includes(lower))
    );
    allTasks = cuFiltered;
    cuHasMore = false;
    renderTaskPage();
  }

  async function fetchMyTasks(force = false) {
    if (!force && myTasks.length > 0) return;
    const list = document.getElementById('tasks-list');
    list.innerHTML = '<div class="loading-wrap"><div class="spinner"></div>내 태스크 불러오는 중...</div>';

    try {
      // 토큰에서 유저 ID 추출 (pk_{userId}_{...})
      const userId = CLICKUP_TOKEN.split('_')[1];
      cuKeyword = '';
      cuPage = 0;
      cuHasMore = true;
      cuFiltered = [];

      // 담당자로 필터링하여 전체 로드
      while (cuHasMore) {
        const res = await fetch(
          'https://api.clickup.com/api/v2/team/25540965/task?space_ids[]=' + CLICKUP_SPACE_ID +
          '&assignees[]=' + userId + '&subtasks=true&include_closed=true&page=' + cuPage,
          { headers: { 'Authorization': CLICKUP_TOKEN } }
        );
        const json = await res.json();
        const tasks = json.tasks || [];
        cuFiltered = cuFiltered.concat(tasks);
        if (tasks.length < 100) cuHasMore = false;
        cuPage++;
      }

      myTasks = sortByDateCreated(cuFiltered);
      cuFiltered = myTasks;
      allTasks = myTasks;
      cuHasMore = false;
      renderTaskPage();
    } catch (e) {
      list.innerHTML = '<div class="empty-list">불러오기 실패<br>' + e.message + '</div>';
    }
  }

  async function fetchTasksByKeyword(q) {
    if (!q.trim()) return;
    cuKeyword = q.trim().toLowerCase();
    cuPage = 0;
    cuHasMore = true;
    cuFiltered = [];
    await loadNextCuPage(true);
  }

  async function loadNextCuPage(isNew = false) {
    const list = document.getElementById('tasks-list');
    if (isNew) {
      list.innerHTML = '<div class="loading-wrap"><div class="spinner"></div>검색 중...</div>';
    } else {
      const btn = document.getElementById('btn-load-more');
      if (btn) { btn.disabled = true; btn.textContent = '불러오는 중...'; }
    }
    try {
      const prevCount = cuFiltered.length;
      while (cuHasMore) {
        const res = await fetch(
          'https://api.clickup.com/api/v2/team/25540965/task?space_ids[]=' + CLICKUP_SPACE_ID + '&subtasks=true&include_closed=true&page=' + cuPage,
          { headers: { 'Authorization': CLICKUP_TOKEN } }
        );
        const json = await res.json();
        const tasks = json.tasks || [];
        const matched = tasks.filter(t =>
          (t.name && t.name.toLowerCase().includes(cuKeyword)) ||
          (t.description && t.description.toLowerCase().includes(cuKeyword))
        );
        cuFiltered = cuFiltered.concat(matched);
        if (tasks.length < 100) cuHasMore = false;
        cuPage++;
        if (cuFiltered.length - prevCount >= 10) break; // 10개 이상 모이면 표시
      }
      cuFiltered = sortByDateCreated(cuFiltered);
      allTasks = cuFiltered;
      renderTaskPage();
    } catch (e) {
      list.innerHTML = '<div class="empty-list">불러오기 실패<br>' + e.message + '</div>';
    }
  }

  function initQuill() {
    // 이미지 클릭 시 새 탭으로 열기
    const editorEl = document.querySelector('#quill-editor');
    editorEl.addEventListener('dblclick', e => {
      if (e.target.tagName === 'IMG') {
        window.open(e.target.src, '_blank');
      }
    });

    // Image 블롯 확장 - style 속성 보존
    const ImageBlot = Quill.import('formats/image');
    class CustomImageBlot extends ImageBlot {
      static formats(domNode) {
        const formats = super.formats(domNode);
        if (domNode.hasAttribute('style')) formats.style = domNode.getAttribute('style');
        return formats;
      }
      format(name, value) {
        if (name === 'style') {
          if (value) this.domNode.setAttribute('style', value);
          else this.domNode.removeAttribute('style');
        } else {
          super.format(name, value);
        }
      }
    }
    CustomImageBlot.blotName = 'image';
    CustomImageBlot.tagName = 'IMG';
    Quill.register(CustomImageBlot, true);

    quill = new Quill('#quill-editor', {
      theme: 'snow',
      placeholder: '메모를 입력하세요...',
      modules: {

        toolbar: {
          container: [
            ['bold', 'italic', 'underline', 'strike'],
            [{ header: [1, 2, 3, false] }],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['link', 'image'],
            ['clean']
          ],
          handlers: {
            image: function() {
              const input = document.createElement('input');
              input.type = 'file';
              input.accept = 'image/*';
              input.click();
              input.onchange = async () => {
                const file = input.files[0];
                if (!file) return;
                showToast('이미지 처리 중...');
                const resized = await resizeImage(file, 1200, 1200, 0.85);
                showToast('이미지 업로드 중...');
                const fileName = `${currentUsername}/${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
                const { error } = await sb.storage.from('memo-images').upload(fileName, resized, { contentType: 'image/jpeg' });
                if (error) { showToast('업로드 실패: ' + error.message); return; }
                const { data } = sb.storage.from('memo-images').getPublicUrl(fileName);
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, 'image', data.publicUrl);
                quill.setSelection(range.index + 1);
                showToast('이미지 삽입 완료!');
              };
            }
          }
        }
      }
    });
    initImageResize();
  }


  function initImageResize() {
    // 오버레이 생성
    const overlay = document.createElement('div');
    overlay.id = 'img-resize-overlay';
    const handle = document.createElement('div');
    handle.id = 'img-resize-handle';
    const label = document.createElement('div');
    label.id = 'img-resize-label';
    overlay.appendChild(handle);
    overlay.appendChild(label);
    document.body.appendChild(overlay);

    let selectedImg = null;
    let isResizing = false;
    let startX, startW;

    const positionOverlay = () => {
      if (!selectedImg) return;
      const rect = selectedImg.getBoundingClientRect();
      overlay.style.left = rect.left + 'px';
      overlay.style.top = rect.top + 'px';
      overlay.style.width = rect.width + 'px';
      overlay.style.height = rect.height + 'px';
      label.textContent = Math.round(rect.width) + ' × ' + Math.round(rect.height) + 'px';
    };

    const selectImg = (img) => {
      selectedImg = img;
      overlay.style.display = 'block';
      positionOverlay();
    };

    const deselect = () => {
      selectedImg = null;
      overlay.style.display = 'none';
    };

    // 이미지 클릭/탭 시 선택
    document.querySelector('#quill-editor').addEventListener('click', e => {
      if (e.target.tagName === 'IMG') { selectImg(e.target); e.stopPropagation(); }
    });
    document.querySelector('#quill-editor').addEventListener('touchend', e => {
      if (e.target.tagName === 'IMG') { selectImg(e.target); e.stopPropagation(); }
    });

    // 외부 클릭 시 해제
    document.addEventListener('click', e => {
      if (!overlay.contains(e.target) && e.target.tagName !== 'IMG') deselect();
    });

    // 드래그 리사이즈 (마우스 + 터치 공통)
    const startResize = (clientX) => {
      isResizing = true;
      startX = clientX;
      startW = selectedImg.offsetWidth;
    };
    const doResize = (clientX) => {
      if (!isResizing || !selectedImg) return;
      const newW = Math.max(40, startW + (clientX - startX));
      selectedImg.style.width = newW + 'px';
      selectedImg.style.height = 'auto';
      positionOverlay();
    };
    const stopResize = () => { isResizing = false; };

    // 마우스
    handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      startResize(e.clientX);
    });
    document.addEventListener('mousemove', e => doResize(e.clientX));
    document.addEventListener('mouseup', stopResize);

    // 터치
    handle.addEventListener('touchstart', e => {
      e.preventDefault(); e.stopPropagation();
      startResize(e.touches[0].clientX);
    }, { passive: false });
    document.addEventListener('touchmove', e => {
      if (isResizing) { e.preventDefault(); doResize(e.touches[0].clientX); }
    }, { passive: false });
    document.addEventListener('touchend', stopResize);

    // 스크롤 시 오버레이 위치 업데이트
    document.querySelector('.ql-container')?.addEventListener('scroll', () => {
      if (selectedImg) positionOverlay();
    });
  }

  function resizeImage(file, maxW, maxH, quality) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let { width, height } = img;
        if (width > maxW || height > maxH) {
          const ratio = Math.min(maxW / width, maxH / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        canvas.toBlob(resolve, 'image/jpeg', quality);
      };
      img.src = url;
    });
  }

  function stripHtml(html) {

  async function downloadAttachment(url, filename) {
    try {
      showToast('다운로드 중...');
      const res = await fetch(url, { headers: { Authorization: CLICKUP_TOKEN } });
      if (!res.ok) throw new Error('서버 오류 ' + res.status);
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('다운로드 완료!');
    } catch(e) {
      // CORS 등 실패 시 새 탭으로 열기
      window.open(url, '_blank');
      showToast('새 탭에서 파일을 저장하세요.');
    }
  }

    const content = quill.root.innerHTML;

      p_id: currentNoteId || null,

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    if (diff < 60000) return '방금 전';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}분 전`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}시간 전`;
    const d = new Date(dateStr);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // 탭/앱이 다시 활성화될 때 메모 목록 새로고침
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && currentUsername) {
      loadNotes();
    }
  });

  init();
</script>
</body>
</html>
